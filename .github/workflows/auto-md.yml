name: Generate Knowledge MD

on:
  push:
    paths:
      - 'Raw pdfs/**'    # 新 PDF 推上來就觸發
      - 'gmp_engine.py'  # engine 更新時也重新生成
  schedule:
    - cron: '0 23 * * *' # 每天台灣時間早上 7 點（UTC 23:00）
  workflow_dispatch:      # 也可手動觸發

jobs:
  generate-md:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pymupdf4llm

      - name: Generate all knowledge markdown
        run: python gmp_engine.py md --all

      - name: Move processed PDFs to processed/
        run: |
          python - <<'EOF'
          import sys, shutil
          from pathlib import Path

          sys.path.insert(0, '.')
          import gmp_engine

          processed_dir = Path("Raw pdfs/processed")
          processed_dir.mkdir(exist_ok=True)

          for report_id, pdf_filename in gmp_engine.PDF_FILES.items():
              pdf_path = Path("Raw pdfs") / pdf_filename
              if not pdf_path.exists():
                  continue  # 已移動過或不在此 repo
              try:
                  config = gmp_engine.load_config(report_id)
                  knowledge_subdir = gmp_engine._knowledge_subdir(config)
                  folder_id = config.get('folder', report_id).split('/')[-1]
                  md_path = knowledge_subdir / f"{folder_id}-Complete.md"
                  if md_path.exists():
                      shutil.move(str(pdf_path), str(processed_dir / pdf_filename))
                      print(f"  Moved: {pdf_filename} → processed/")
              except SystemExit:
                  pass  # report 不在 reports.json，跳過
          EOF

      - name: Commit generated markdown and moved PDFs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add knowledge/ "Raw pdfs/"
          git diff --staged --quiet || git commit -m "auto: regenerate MD, move processed PDFs"
          git push
