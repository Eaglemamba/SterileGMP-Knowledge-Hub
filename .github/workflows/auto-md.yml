name: Generate Knowledge MD

on:
  push:
    paths:
      - '**/source/**'   # 任何 source/ 資料夾有新 txt 就觸發
  workflow_dispatch:      # 也可手動觸發

jobs:
  generate-md:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pymupdf4llm

      - name: Generate all knowledge markdown
        run: python gmp_engine.py md --all

      - name: Commit generated markdown
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add knowledge/
          git diff --staged --quiet || git commit -m "auto: regenerate knowledge markdown"
          git push
