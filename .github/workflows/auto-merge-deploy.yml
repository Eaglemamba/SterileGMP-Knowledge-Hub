name: Merge HTML and Deploy

on:
  push:
    paths:
      - '**/sections/**'   # Claude 生成的 HTML sections push 後觸發
  schedule:
    - cron: '0 23 * * *' # 每天台灣時間早上 7 點（UTC 23:00）
  workflow_dispatch:
    inputs:
      report_id:
        description: 'Report ID to merge (e.g. TR90, leave empty for all changed)'
        required: false

jobs:
  merge-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2   # 需要前一個 commit 來比較變更

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pymupdf4llm

      - name: Detect changed report IDs and merge
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            # 定時執行：merge 全部
            python gmp_engine.py merge --all
          elif [ -n "${{ github.event.inputs.report_id }}" ]; then
            # 手動指定 report ID
            python gmp_engine.py merge ${{ github.event.inputs.report_id }}
          else
            # push 觸發：自動偵測哪個 sections/ 資料夾有變更
            CHANGED=$(git diff --name-only HEAD~1 HEAD | grep '/sections/' | sed 's|.*/\([^/]*\)/sections/.*|\1|' | sort -u)
            if [ -z "$CHANGED" ]; then
              echo "No sections changed, skipping merge."
              exit 0
            fi
            for REPORT_ID in $CHANGED; do
              echo "Merging $REPORT_ID..."
              python gmp_engine.py merge $REPORT_ID
            done
          fi

      - name: Commit merged output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add knowledge/ PDA/ FDA/ ICH/ ISO/ ISPE/ USP/ PHEUR/ PICS/
          git diff --staged --quiet || git commit -m "auto: merge HTML and update knowledge"
          git push

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: success()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
          exclude_assets: '.github,Raw pdfs,*.py,*.json'
