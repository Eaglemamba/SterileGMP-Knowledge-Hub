<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDA_Technical-Report-Knowledge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: {
            'pda': { 'blue': '#1e3a5f', 'blue-light': '#3182ce', 'blue-dark': '#152a45', 'accent': '#3498db' }
        }}}}
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'DM Sans', 'Noto Sans TC', -apple-system, sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .doc-card { transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
        .doc-card:hover { transform: translateY(-3px); box-shadow: 0 12px 28px rgba(30,58,95,0.15); }
        .tag-pill { font-size: 0.65rem; padding: 2px 8px; border-radius: 9999px; font-weight: 600; letter-spacing: 0.03em; white-space: nowrap; }
        .search-hits { margin-top: 0.5rem; padding: 0.5rem 0.75rem; background: #f0f7ff; border-left: 3px solid #1e3a5f; border-radius: 0 0.375rem 0.375rem 0; font-size: 0.7rem; line-height: 1.6; color: #475569; }
        .search-hits .hit-title { font-weight: 600; color: #1e3a5f; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.25rem; }
        .search-hits mark { background: #fde68a; color: #92400e; padding: 0 2px; border-radius: 2px; }
        .relevance-bar { height: 3px; border-radius: 2px; margin-top: 2px; transition: width 0.3s ease; }
        .match-badges { display: flex; gap: 0.25rem; flex-wrap: wrap; }
        .match-badge { font-size: 0.6rem; padding: 1px 6px; border-radius: 4px; font-weight: 600; }
        .match-badge-title { background: #dbeafe; color: #1e40af; }
        .match-badge-summary { background: #d1fae5; color: #065f46; }
        .match-badge-content { background: #f3e8ff; color: #6b21a8; }
        .match-badge-tag { background: #fef3c7; color: #92400e; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        .fade-up { animation: fadeUp 0.4s ease-out forwards; opacity: 0; }
        .fade-up:nth-child(2) { animation-delay: 0.05s; }
        .fade-up:nth-child(3) { animation-delay: 0.1s; }
        .fade-up:nth-child(4) { animation-delay: 0.15s; }
        body.search-active #statsRow,
        body.search-active #categoryBar,
        body.search-active #categoryLegend { display: none; }
        body.search-active .bg-gradient-to-br { padding-bottom: 1.5rem; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <!-- HEADER -->
    <div class="bg-gradient-to-br from-pda-blue via-pda-blue-light to-pda-blue text-white px-6 py-8 relative overflow-hidden">
        <div class="absolute inset-0 opacity-10">
            <div class="absolute top-0 right-0 w-96 h-96 bg-white rounded-full -translate-y-1/2 translate-x-1/3"></div>
            <div class="absolute bottom-0 left-0 w-64 h-64 bg-white rounded-full translate-y-1/2 -translate-x-1/4"></div>
        </div>
        <div class="max-w-6xl mx-auto relative">
            <div class="text-center">
                <h1 class="text-2xl font-bold tracking-tight">PDA_Technical-Report-Knowledge</h1>
                <p class="text-blue-200 text-sm mt-1">Pharma Manufacturing x Education -- Bilingual Educational Document Index</p>
                <p class="text-xs text-blue-300 mt-2">Last updated: <span id="lastUpdated"></span></p>
            </div>
            <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mt-5" id="statsRow"></div>
        </div>
    </div>

    <!-- CATEGORY BAR -->
    <div class="max-w-6xl mx-auto px-6 mt-4">
        <div class="flex h-2 rounded-full overflow-hidden bg-gray-200" id="categoryBar"></div>
        <div class="flex gap-4 flex-wrap mt-2" id="categoryLegend"></div>
    </div>

    <!-- SEARCH & FILTERS -->
    <div class="max-w-6xl mx-auto px-6 mt-4 flex gap-3 flex-wrap items-center">
        <input type="text" id="searchBox" placeholder="Search titles, sources, tags, and full content..."
               class="flex-1 min-w-[250px] px-4 py-2 bg-white border border-gray-200 rounded-lg text-gray-800 text-sm focus:outline-none focus:border-pda-blue focus:ring-1 focus:ring-pda-blue">
        <span id="resultCount" class="text-xs text-pda-blue font-medium" style="display:none"></span>
        <div class="flex gap-2 flex-wrap" id="filterBtns"></div>
        <select id="sortSelect" onchange="this._userChanged=true;renderCards()"
                class="px-3 py-1.5 bg-white border border-gray-200 rounded-lg text-gray-700 text-xs focus:outline-none focus:border-pda-blue">
            <option value="relevance">Relevance</option>
            <option value="date-desc">Newest first</option>
            <option value="date-asc">Oldest first</option>
            <option value="source">By Source</option>
        </select>
    </div>

    <!-- DOCUMENT CARDS -->
    <div class="max-w-6xl mx-auto px-6 py-4 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4" id="docGrid"></div>

    <!-- FOOTER -->
    <div class="max-w-6xl mx-auto px-6 py-6 text-center text-xs text-gray-400 border-t border-gray-200 mt-4">
        <p>Pharma Manufacturing x Education | Built with Claude AI</p>
    </div>

<script>window.searchIndex = window.searchIndex || [];</script>
<script src="search-index.js" onerror=""></script>
<script>
// ============================================================
// DOCUMENT DATA -- Each entry = one educational HTML file
// To add new documents from ANY source, append to this array.
// ============================================================
const documents = [
    // One card per PDA Technical Report — links to merged TopNav document
    { date:"2026-03-15", title:"PDA Guide No.1: Aseptic Filling, Engineering & Operation (2025)", titleZh:"無菌充填工程與操作技術指引",
      source:"PDA Guide No.1", tags:["Aseptic","Filling","Design","GMP","Dose Control","CDMO"],
      summary:"完整20章：充填線設計要素、四大液體充填技術(PP/RPP/TP/DP)、功能性考量、劑量控制、容器封閉系統、操作考量、元件導入、無菌液體路徑、批次設置丟棄策略、APS無菌模擬、粉末充填、案例研究。267頁全覆蓋。",
      sections:20, pages:"p1-p267", figures:0, file:"pda-guide-no1/output/Guide-No1-Complete.html" },

    { date:"2026-03-14", title:"PDA TR26: Sterilizing Filtration of Liquids", titleZh:"液體除菌過濾",
      source:"PDA TR26", tags:["Filtration","Validation","Integrity Test","Sterilization","QbD"],
      summary:"完整8章+3附錄：濾膜原理、確效、製程設計(QbD)、驗證測試(細菌截留/E&L)、完整性測試(PUPSIT)、滅菌方法(Steam/Irradiation/EO)。Revised 2025版，73頁。",
      sections:11, pages:"p1-p73", figures:0, file:"TR26/output/TR26-Complete.html" }
];

// ============================================================
// CONFIG
// ============================================================
const sourceColors = {
    "PDA Guide No.1": { bg:"#dbeafe", text:"#1e40af", bar:"#3b82f6", short:"Guide No.1" },
    "PDA TR26": { bg:"#d1fae5", text:"#065f46", bar:"#10b981", short:"TR26" }
};

const tagCls={
    "Aseptic":"bg-blue-50 text-blue-700 border border-blue-200 font-semibold",
    "Overview":"bg-slate-100 text-slate-600","Glossary":"bg-slate-100 text-slate-600",
    "GMP":"bg-red-50 text-red-600","Annex 1":"bg-red-50 text-red-600",
    "Design":"bg-blue-50 text-blue-600","Selection":"bg-blue-50 text-blue-600",
    "Phase-Appropriate":"bg-blue-50 text-blue-700","Technology":"bg-indigo-50 text-indigo-600",
    "PP":"bg-violet-50 text-violet-600","RPP":"bg-violet-50 text-violet-600",
    "TP":"bg-violet-50 text-violet-600","DP":"bg-violet-50 text-violet-600",
    "Needle":"bg-blue-50 text-blue-600","Single-Use":"bg-emerald-50 text-emerald-600",
    "Functionality":"bg-indigo-50 text-indigo-600","Changeover":"bg-indigo-50 text-indigo-600",
    "Foam Control":"bg-indigo-50 text-indigo-600",
    "Dose Control":"bg-purple-50 text-purple-600","IPC":"bg-purple-50 text-purple-600",
    "Weight Check":"bg-purple-50 text-purple-600",
    "Container":"bg-cyan-50 text-cyan-600","Closure":"bg-cyan-50 text-cyan-600",
    "RTU":"bg-cyan-50 text-cyan-600","Closing":"bg-cyan-50 text-cyan-600",
    "Elastomer":"bg-cyan-50 text-cyan-600","Stopper":"bg-cyan-50 text-cyan-600",
    "Interventions":"bg-teal-50 text-teal-600","Line Setup":"bg-teal-50 text-teal-600",
    "Risk":"bg-orange-50 text-orange-600","Components":"bg-teal-50 text-teal-600",
    "Sterilization":"bg-teal-50 text-teal-600","Transfer":"bg-teal-50 text-teal-600",
    "SIP":"bg-teal-50 text-teal-600","VPHP":"bg-teal-50 text-teal-600",
    "Fluid Path":"bg-teal-50 text-teal-600","Filter":"bg-teal-50 text-teal-600",
    "PUPSIT":"bg-teal-50 text-teal-600","Operations":"bg-teal-50 text-teal-600",
    "Priming":"bg-teal-50 text-teal-600","Yield":"bg-teal-50 text-teal-600",
    "APS":"bg-teal-50 text-teal-600","Media Fill":"bg-teal-50 text-teal-600",
    "Validation":"bg-teal-50 text-teal-600","EM":"bg-teal-50 text-teal-600",
    "Microbiology":"bg-teal-50 text-teal-600","Grade A":"bg-teal-50 text-teal-600",
    "CCS":"bg-teal-50 text-teal-600","Supplier":"bg-teal-50 text-teal-600",
    "Quality":"bg-teal-50 text-teal-600","SCM":"bg-teal-50 text-teal-600",
    "IQ/OQ/PQ":"bg-teal-50 text-teal-600","Lifecycle":"bg-teal-50 text-teal-600",
    "Maintenance":"bg-teal-50 text-teal-600","Calibration":"bg-teal-50 text-teal-600",
    "Powder":"bg-amber-50 text-amber-600","Lyophilization":"bg-amber-50 text-amber-600",
    "Reference":"bg-gray-100 text-gray-600","PDA TR":"bg-gray-100 text-gray-600",
    "ICH":"bg-gray-100 text-gray-600","Case Study":"bg-gray-100 text-gray-600",
    "Decision":"bg-gray-100 text-gray-600","CDMO":"bg-orange-50 text-orange-700",
    "Vendor":"bg-gray-100 text-gray-600","Equipment":"bg-gray-100 text-gray-600",
    "QbD":"bg-green-50 text-green-600","Design Space":"bg-green-50 text-green-600",
    "CQA":"bg-purple-50 text-purple-600",
    "Filtration":"bg-emerald-50 text-emerald-700 border border-emerald-200 font-semibold",
    "Membrane":"bg-emerald-50 text-emerald-600","Mechanism":"bg-emerald-50 text-emerald-600",
    "Qualification":"bg-emerald-50 text-emerald-600","E&L":"bg-emerald-50 text-emerald-600",
    "Bacterial Retention":"bg-emerald-50 text-emerald-600","Integrity Test":"bg-emerald-50 text-emerald-600",
    "PUPSIT":"bg-emerald-50 text-emerald-600","Bubble Point":"bg-emerald-50 text-emerald-600",
    "Process Design":"bg-emerald-50 text-emerald-600","Scale-Up":"bg-emerald-50 text-emerald-600",
    "Autoclave":"bg-emerald-50 text-emerald-600","Diffusion":"bg-emerald-50 text-emerald-600",
    "Methods":"bg-emerald-50 text-emerald-600","Troubleshooting":"bg-amber-50 text-amber-600",
    "Regulatory":"bg-red-50 text-red-600","Operations":"bg-teal-50 text-teal-600"
};

// Dynamic source filters
const allSources=[...new Set(documents.map(d=>d.source))];
const filterMap={'all':'all'};
allSources.forEach(s=>{const sc=sourceColors[s];filterMap[sc?sc.short:s]=s;});
const filterTags=['all',...allSources.map(s=>(sourceColors[s]||{}).short||s)];
let activeFilter='all';

// Deep search index
const sectionsByFile={};
if(typeof searchIndex!=='undefined'){searchIndex.forEach(e=>{if(!sectionsByFile[e.docFile])sectionsByFile[e.docFile]=[];sectionsByFile[e.docFile].push(e);});}

// ============================================================
// RENDER
// ============================================================
function renderStats(){
    const t=documents.length;
    const tp=documents.reduce((s,d)=>{const m=d.pages?d.pages.match(/p(\d+)\s*-\s*p(\d+)/):null;return s+(m?parseInt(m[2])-parseInt(m[1])+1:0);},0);
    const allTags=[...new Set(documents.flatMap(d=>d.tags))];
    const latest=documents.reduce((a,b)=>a.date>b.date?a:b);
    const latestShort=(sourceColors[latest.source]||{}).short||latest.source;
    const stats=[{v:t,l:'Reports'},{v:tp+'p',l:'Pages Covered'},{v:allTags.length,l:'Topics'},{v:latestShort,l:'Latest Added'}];
    document.getElementById('statsRow').innerHTML=stats.map(s=>`<div class="bg-white/10 backdrop-blur rounded-lg px-4 py-3 border border-white/20 hover:border-white/40 transition-colors text-center"><div class="mono text-2xl font-bold text-white">${s.v}</div><div class="text-xs text-blue-200 mt-0.5">${s.l}</div></div>`).join('');
    document.getElementById('lastUpdated').textContent=latest.date;
    const sc={};documents.forEach(d=>{sc[d.source]=(sc[d.source]||0)+1;});
    const tot=Object.values(sc).reduce((a,b)=>a+b,0);
    document.getElementById('categoryBar').innerHTML=Object.entries(sc).map(([s,c])=>`<div style="width:${c/tot*100}%;background:${(sourceColors[s]||{}).bar||'#6b7280'}"></div>`).join('');
    document.getElementById('categoryLegend').innerHTML=Object.entries(sc).map(([s,c])=>`<div class="flex items-center gap-1.5 text-xs text-gray-500"><div class="w-2 h-2 rounded-sm" style="background:${(sourceColors[s]||{}).bar||'#6b7280'}"></div>${(sourceColors[s]||{}).short||s} (${c})</div>`).join('');
}

function initFilters(){
    document.getElementById('filterBtns').innerHTML=filterTags.map(f=>{
        const a=f===activeFilter;
        const c=a?'bg-pda-blue text-white border-pda-blue':'border-gray-200 text-gray-600 bg-white hover:border-pda-blue hover:text-pda-blue';
        return `<button class="px-3 py-1.5 rounded-lg text-xs font-medium border ${c} transition-colors" onclick="setFilter('${f}')">${f==='all'?'All':f}</button>`;
    }).join('');
}
function setFilter(f){activeFilter=f;initFilters();renderCards();}

let prevSort='date-desc';
function getSnippet(content,query){const l=content.toLowerCase(),i=l.indexOf(query);if(i===-1)return'';const s=Math.max(0,i-40),e=Math.min(content.length,i+query.length+60);let sn=(s>0?'...':'')+content.substring(s,e)+(e<content.length?'...':'');const esc=query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');return sn.replace(new RegExp('('+esc+')','gi'),'<mark>$1</mark>');}

function getFiltered(){
    let d=[...documents];const s=document.getElementById('searchBox').value.toLowerCase().trim();
    const sortEl=document.getElementById('sortSelect');
    if(s&&sortEl.value!=='relevance'&&!sortEl._userChanged){prevSort=sortEl.value;sortEl.value='relevance';}
    else if(!s&&sortEl.value==='relevance'&&!sortEl._userChanged){sortEl.value=prevSort;}
    sortEl._userChanged=false;
    d.forEach(x=>{x._hits=null;x._score=0;x._matchTypes=[];});
    if(s){d=d.filter(x=>{let sc=0;const ty=[];
        if(x.title.toLowerCase().includes(s)){sc+=10;ty.push('title');}
        if(x.titleZh&&x.titleZh.includes(s)){sc+=8;ty.push('title');}
        if(x.tags.some(t=>t.toLowerCase().includes(s))){sc+=5;ty.push('tag');}
        if(x.summary.toLowerCase().includes(s)){sc+=3;ty.push('summary');}
        if(x.source.toLowerCase().includes(s)){sc+=2;ty.push('title');}
        if(x.pages&&x.pages.toLowerCase().includes(s)){sc+=2;ty.push('title');}
        const secs=sectionsByFile[x.file]||[];
        const hits=secs.filter(sec=>sec.content.toLowerCase().includes(s));
        if(hits.length>0){sc+=Math.min(hits.length,8);ty.push('content');x._hits=hits.map(h=>({sectionTitle:h.sectionTitle,snippet:getSnippet(h.content,s)}));}
        x._score=sc;x._matchTypes=[...new Set(ty)];return sc>0;
    });}
    if(activeFilter!=='all'){const sf=filterMap[activeFilter];d=d.filter(x=>x.source===sf);}
    const sort=sortEl.value;
    if(sort==='relevance'&&s)d.sort((a,b)=>b._score-a._score||b.date.localeCompare(a.date));
    else if(sort==='date-desc')d.sort((a,b)=>b.date.localeCompare(a.date));
    else if(sort==='date-asc')d.sort((a,b)=>a.date.localeCompare(b.date));
    else if(sort==='source')d.sort((a,b)=>a.source.localeCompare(b.source)||a.date.localeCompare(b.date));
    return d;
}

function renderCards(){
    const docs=getFiltered();const s=document.getElementById('searchBox').value.toLowerCase().trim();
    const ce=document.getElementById('resultCount');
    if(ce){ce.textContent=s?`${docs.length} results`:'';ce.style.display=s?'inline':'none';}
    document.body.classList.toggle('search-active',!!s);
    if(!docs.length){document.getElementById('docGrid').innerHTML='<div class="col-span-full text-center py-12 text-gray-400">No documents match.</div>';return;}
    const mx=Math.max(...docs.map(d=>d._score||0),1);

    document.getElementById('docGrid').innerHTML=docs.map((d,i)=>{
        const sc=sourceColors[d.source]||{bg:'#f1f5f9',text:'#475569',short:d.source};
        const tags=d.tags.slice(0,4).map(t=>`<span class="tag-pill ${tagCls[t]||'bg-gray-100 text-gray-600'}">${t}</span>`).join('');
        const fb=d.figures?`<span class="tag-pill bg-orange-50 text-orange-600">${d.figures} fig</span>`:'';
        const btn=d.file?`<a href="${d.file}" target="_blank" class="text-xs bg-pda-blue text-white px-3 py-1 rounded hover:bg-pda-blue-light no-underline transition-colors">Open</a>`:'';
        let rel='';
        if(s&&d._score>0){const p=Math.round(d._score/mx*100);const bc=p>=70?'#1e3a5f':p>=40?'#3182ce':'#93c5fd';
            const bm={title:'Title',tag:'Tag',summary:'Summary',content:'Content'};
            const bl={title:'match-badge-title',tag:'match-badge-tag',summary:'match-badge-summary',content:'match-badge-content'};
            const mb=d._matchTypes.map(t=>`<span class="match-badge ${bl[t]}">${bm[t]}</span>`).join('');
            rel=`<div class="flex items-center gap-2 mt-2"><div class="match-badges">${mb}</div><div class="flex-1 bg-gray-100 rounded-full h-1.5"><div class="relevance-bar h-1.5 rounded-full" style="width:${p}%;background:${bc}"></div></div><span class="mono text-[10px] text-gray-400">#${i+1}</span></div>`;}
        let hh='';
        if(d._hits&&d._hits.length>0){const sh=d._hits.slice(0,3);const mo=d._hits.length>3?`<div class="text-[10px] text-gray-400 mt-1">+${d._hits.length-3} more</div>`:'';
            hh=`<div class="search-hits"><div class="hit-title">Content matches (${d._hits.length})</div>${sh.map(h=>`<div class="text-[10px]"><span class="font-medium text-pda-blue">${h.sectionTitle}</span>: ${h.snippet}</div>`).join('')}${mo}</div>`;}
        const bc2=s&&d._score>0?(d._score/mx>=0.7?'border-pda-blue':d._score/mx>=0.4?'border-blue-300':'border-gray-200'):'border-gray-200';
        const sm=!s,ss=!s||!(d._hits&&d._hits.length>0);
        return `<div class="doc-card fade-up bg-white rounded-xl border ${bc2} p-4 flex flex-col">
            ${sm?`<div class="flex items-center justify-between"><span class="mono text-xs text-gray-400">${d.date}</span><span class="text-[10px] px-2 py-0.5 rounded font-medium" style="background:${sc.bg};color:${sc.text}">${sc.short}</span></div>`:''}
            <h3 class="text-sm font-semibold text-gray-900 ${sm?'mt-2':''} leading-snug">${d.title}</h3>
            ${d.titleZh?`<p class="text-xs text-gray-500 mt-0.5">${d.titleZh}</p>`:''}
            ${sm?`<div class="flex gap-1 flex-wrap mt-2">${tags}${fb}</div>`:''}
            ${rel}
            ${ss?`<p class="text-xs text-gray-600 leading-relaxed mt-2 flex-1">${d.summary}</p>`:''}
            ${hh}
            <div class="flex items-center justify-between mt-3 pt-3 border-t border-gray-100">
                <div class="flex items-center gap-3"><span class="mono text-[10px] text-gray-400">${d.pages||''}</span><span class="mono text-[10px] text-gray-400">${d.sections?d.sections+' sections':''}</span></div>${btn}
            </div></div>`;
    }).join('');
}

let st;document.getElementById('searchBox').addEventListener('input',()=>{clearTimeout(st);st=setTimeout(renderCards,150);});
initFilters();renderStats();renderCards();
</script>
</body>
</html>
