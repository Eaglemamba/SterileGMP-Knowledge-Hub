function getSourceOrg(source) {
  if (/^PDA/i.test(source)) return 'PDA';
  if (/^ISPE/i.test(source)) return 'ISPE';
  if (/^FDA/i.test(source)) return 'FDA';
  if (/^PIC\/S|^PICS/i.test(source)) return 'PIC/S';
  if (/^ISO/i.test(source)) return 'ISO';
  if (/^ECA/i.test(source)) return 'ECA';
  if (/^USP/i.test(source)) return 'USP';
  return source.split(/[\s\-]/)[0];
}

    }).join('');
}

function initFilters(){
    const tagCounts={};
    documents.forEach(d=>d.tags.forEach(t=>{tagCounts[t]=(tagCounts[t]||0)+1;}));
    const topTags=Object.entries(tagCounts).filter(([,c])=>c>=2).sort((a,b)=>b[1]-a[1]||a[0].localeCompare(b[0])).map(([t])=>t);
    const list=['all',...topTags];
    document.getElementById('filterBtns').innerHTML=list.map(f=>{
        const a=f===activeFilter;
        const c=a?'bg-slate-700 text-white border-slate-700':'border-gray-200 text-gray-600 bg-white hover:border-slate-500 hover:text-slate-700';
        return `<button class="px-3 py-1.5 rounded-lg text-xs font-medium border ${c} transition-colors" onclick="setFilter('${f}')">${f==='all'?'All':f}</button>`;
    }).join('');
}
function setFilter(f){activeFilter=f;initFilters();renderCards();}

let prevSort='date-desc';
function getSnippet(content,query){const l=content.toLowerCase(),i=l.indexOf(query);if(i===-1)return'';const s=Math.max(0,i-40),e=Math.min(content.length,i+query.length+60);let sn=(s>0?'...':'')+content.substring(s,e)+(e<content.length?'...':'');const esc=query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');return sn.replace(new RegExp('('+esc+')','gi'),'<mark>$1</mark>');}

function getFiltered(){
    let d=[...documents];const s=document.getElementById('searchBox').value.toLowerCase().trim();
    const sortEl=document.getElementById('sortSelect');
    if(s&&sortEl.value!=='relevance'&&!sortEl._userChanged){prevSort=sortEl.value;sortEl.value='relevance';}
    else if(!s&&sortEl.value==='relevance'&&!sortEl._userChanged){sortEl.value=prevSort;}
    sortEl._userChanged=false;
    d.forEach(x=>{x._hits=null;x._score=0;x._matchTypes=[];});
    if(s){d=d.filter(x=>{let sc=0;const ty=[];
        if(x.title.toLowerCase().includes(s)){sc+=10;ty.push('title');}
        if(x.titleZh&&x.titleZh.includes(s)){sc+=8;ty.push('title');}
        if(x.tags.some(t=>t.toLowerCase().includes(s))){sc+=5;ty.push('tag');}
        if(x.summary.toLowerCase().includes(s)){sc+=3;ty.push('summary');}
        if(x.source.toLowerCase().includes(s)){sc+=2;ty.push('title');}
        if(x.pages&&x.pages.toLowerCase().includes(s)){sc+=2;ty.push('title');}
        const secs=sectionsByFile[x.file]||[];
        const hits=secs.filter(sec=>sec.content.toLowerCase().includes(s));
        if(hits.length>0){sc+=Math.min(hits.length,8);ty.push('content');x._hits=hits.map(h=>({sectionTitle:h.sectionTitle,snippet:getSnippet(h.content,s)}));}
        x._score=sc;x._matchTypes=[...new Set(ty)];return sc>0;
    });}
    if(activeSource!=='all'){d=d.filter(x=>getSourceOrg(x.source)===activeSource);}
    if(activeFilter!=='all'){d=d.filter(x=>x.tags.includes(activeFilter));}
    const sort=sortEl.value;
    if(sort==='relevance'&&s)d.sort((a,b)=>b._score-a._score||b.date.localeCompare(a.date));
    else if(sort==='date-desc')d.sort((a,b)=>b.date.localeCompare(a.date));
    else if(sort==='date-asc')d.sort((a,b)=>a.date.localeCompare(b.date));
    else if(sort==='source')d.sort((a,b)=>a.source.localeCompare(b.source)||a.date.localeCompare(b.date));
    return d;
}

function renderCards(){
    const docs=getFiltered();const s=document.getElementById('searchBox').value.toLowerCase().trim();
    const ce=document.getElementById('resultCount');
    if(ce){ce.textContent=s?`${docs.length} results`:'';ce.style.display=s?'inline':'none';}
    document.body.classList.toggle('search-active',!!s);
    if(!docs.length){document.getElementById('docGrid').innerHTML='<div class="col-span-full text-center py-12 text-gray-400">No documents match.</div>';return;}
    const mx=Math.max(...docs.map(d=>d._score||0),1);
    const _lv=getLastViewed();

    document.getElementById('docGrid').innerHTML=docs.map((d,i)=>{
        const sc=sourceColors[d.source]||{bg:'#f1f5f9',text:'#475569',short:d.source};
        const tags=d.tags.slice(0,4).map(t=>`<span class="tag-pill ${tagCls[t]||'bg-gray-100 text-gray-600'}">${t}</span>`).join('');
        const fb=d.figures?`<span class="tag-pill bg-orange-50 text-orange-600">${d.figures} fig</span>`:'';
        const isLV=_lv&&_lv.file===d.file;
        const btn=d.file?`<a href="${d.file}" target="_blank" data-track-file="${d.file}" data-track-title="${d.title.replace(/"/g,'&quot;')}" data-track-zh="${(d.titleZh||'').replace(/"/g,'&quot;')}"
            class="track-open text-xs text-white px-3 py-1 rounded no-underline transition-colors opacity-90 hover:opacity-100" style="background:${sc.bar||'#334155'}">Open</a>`:'';
        let rel='';
        if(s&&d._score>0){const p=Math.round(d._score/mx*100);const bc=p>=70?'#334155':p>=40?'#64748b':'#94a3b8';
            const bm={title:'Title',tag:'Tag',summary:'Summary',content:'Content'};
            const bl={title:'match-badge-title',tag:'match-badge-tag',summary:'match-badge-summary',content:'match-badge-content'};
            const mb=d._matchTypes.map(t=>`<span class="match-badge ${bl[t]}">${bm[t]}</span>`).join('');
            rel=`<div class="flex items-center gap-2 mt-2"><div class="match-badges">${mb}</div><div class="flex-1 bg-gray-100 rounded-full h-1.5"><div class="relevance-bar h-1.5 rounded-full" style="width:${p}%;background:${bc}"></div></div><span class="mono text-[10px] text-gray-400">#${i+1}</span></div>`;}
        let hh='';
        if(d._hits&&d._hits.length>0){const sh=d._hits.slice(0,3);const mo=d._hits.length>3?`<div class="text-[10px] text-gray-400 mt-1">+${d._hits.length-3} more</div>`:'';
            hh=`<div class="search-hits"><div class="hit-title">Content matches (${d._hits.length})</div>${sh.map(h=>`<div class="text-[10px]"><span class="font-medium text-slate-700">${h.sectionTitle}</span>: ${h.snippet}</div>`).join('')}${mo}</div>`;}
        const bc2=s&&d._score>0?(d._score/mx>=0.7?'border-slate-500':d._score/mx>=0.4?'border-slate-300':'border-gray-200'):'border-gray-200';
        const sm=!s,ss=!s||!(d._hits&&d._hits.length>0);
        const org=getSourceOrg(d.source);const oc=sourceOrgColors[org]||{};
        const lvBadge=isLV?`<span class="last-viewed-badge">上次閱讀</span>`:'';
        return `<div class="doc-card fade-up bg-white rounded-xl border ${bc2} p-4 flex flex-col${isLV?' is-last-viewed':''}">
            ${sm?`<div class="flex items-center justify-between"><span class="mono text-xs text-gray-400">${d.date}</span><div class="flex items-center gap-1.5">${lvBadge}<span class="text-[9px] px-1.5 py-0.5 rounded font-bold uppercase tracking-wide" style="background:${oc.bg||sc.bg};color:${oc.text||sc.text}">${org}</span><span class="text-[10px] px-2 py-0.5 rounded font-medium" style="background:${sc.bg};color:${sc.text}">${sc.short}</span></div></div>`:''}
            <h3 class="text-sm font-semibold text-gray-900 ${sm?'mt-2':''} leading-snug">${d.title}</h3>
            ${d.titleZh?`<p class="text-xs text-gray-500 mt-0.5">${d.titleZh}</p>`:''}
            ${sm?`<div class="flex gap-1 flex-wrap mt-2">${tags}${fb}</div>`:''}
            ${rel}
            ${ss?`<p class="text-xs text-gray-600 leading-relaxed mt-2 flex-1">${d.summary}</p>`:''}
            ${hh}
            <div class="flex items-center justify-between mt-3 pt-3 border-t border-gray-100">
                <div class="flex items-center gap-3"><span class="mono text-[10px] text-gray-400">${d.pages||''}</span><span class="mono text-[10px] text-gray-400">${d.sections?d.sections+' sections':''}</span></div>${btn}
            </div></div>`;
    }).join('');
}

// ============================================================
// LAST VIEWED TRACKING
// ============================================================
const LS_KEY = 'sgk_last_viewed';

function trackOpen(file, title, titleZh) {
    try { localStorage.setItem(LS_KEY, JSON.stringify({ file, title, titleZh, ts: Date.now() })); } catch(e) {}
}

function getLastViewed() {
    try { return JSON.parse(localStorage.getItem(LS_KEY) || 'null'); } catch(e) { return null; }
}

function timeAgo(ts) {
    const mins = Math.floor((Date.now() - ts) / 60000);
    if (mins < 2) return '剛才';
    if (mins < 60) return `${mins} 分鐘前`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return `${hrs} 小時前`;
    const days = Math.floor(hrs / 24);
    if (days === 1) return '昨天';
    if (days < 30) return `${days} 天前`;
    return `${Math.floor(days / 30)} 個月前`;
}

function renderResumeBanner() {
    const lv = getLastViewed();
    const wrap = document.getElementById('resumeWrap');
    const el = document.getElementById('resumeBanner');
    if (!lv || !wrap || !el) return;
    const displayTitle = lv.titleZh || lv.title;
    const link = lv.file
        ? `<a href="${lv.file}" target="_blank" data-track-file="${lv.file}" data-track-title="${lv.title}" data-track-zh="${lv.titleZh||''}"
              class="track-open text-xs bg-slate-700 text-white px-3 py-1.5 rounded no-underline hover:bg-slate-600 whitespace-nowrap transition-colors">繼續閱讀</a>`
        : '';
    el.innerHTML = `<div class="flex items-center gap-3 flex-wrap">
        <span class="text-[10px] font-bold text-amber-600 uppercase tracking-widest whitespace-nowrap">上次閱讀</span>
        <span class="text-sm font-medium text-slate-800 flex-1 min-w-0 truncate" title="${displayTitle}">${displayTitle}</span>
        <span class="text-xs text-slate-400 whitespace-nowrap">${timeAgo(lv.ts)}</span>
        ${link}
        <button onclick="localStorage.removeItem('${LS_KEY}');document.getElementById('resumeWrap').style.display='none';renderCards();"
                class="text-slate-300 hover:text-slate-500 text-xl leading-none ml-1 transition-colors">&times;</button>
    </div>`;
    wrap.style.display = 'block';
}

// Delegated click handler for all Open buttons (incl. resume banner)
document.addEventListener('click', e => {
    const a = e.target.closest('a.track-open');
    if (!a) return;
    const file  = a.dataset.trackFile;
    const title = a.dataset.trackTitle;
    const zh    = a.dataset.trackZh || '';
    if (file) trackOpen(file, title, zh);
});

let st;document.getElementById('searchBox').addEventListener('input',()=>{clearTimeout(st);st=setTimeout(renderCards,150);});
loadData().then(()=>{initSourceFilters();initFilters();renderStats();renderCards();renderResumeBanner();});
</script>
